<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Reader Lite - {{ filename }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="reader-container">
        <div class="pdf-controls">
            <button id="prev-page-btn" onclick="onPrevPage()">Prev</button>
            <span class="page-nav">
                <input type="number" id="page-num-input" min="1" onchange="goToPage()">
                <span class="page-sep">/</span>
                <span id="page-count"></span>
            </span>
            <button id="next-page-btn" onclick="onNextPage()">Next</button>
            <div class="control-spacer"></div>
            <div class="mode-toggle" role="group" aria-label="Reading mode">
                <button id="mode-reader-btn" type="button">Reader</button>
                <button id="mode-pdf-btn" type="button">PDF</button>
            </div>
            <button id="toggle-display-settings">Settings</button>
        </div>

        <div id="display-settings-container" class="hidden">
            <div class="settings-grid">
                <div class="settings-row">
                    <label>Font Size</label>
                    <div class="btn-group">
                        <button id="font-size-decrease">A-</button>
                        <button id="font-size-increase">A+</button>
                    </div>
                </div>
                <div class="settings-row">
                    <label>Line Spacing</label>
                    <div class="btn-group">
                        <button id="line-height-decrease">-</button>
                        <button id="line-height-increase">+</button>
                    </div>
                </div>
                <div class="settings-row">
                    <label>Margins</label>
                    <div class="btn-group">
                        <button id="margin-decrease">-</button>
                        <button id="margin-increase">+</button>
                    </div>
                </div>
                <div class="settings-row">
                    <label>Font</label>
                    <select id="font-family-select">
                        <option value="'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif">Palatino</option>
                        <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                        <option value="'Bookerly', 'Literata', Georgia, serif">Bookerly</option>
                        <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">System Sans</option>
                        <option value="'Charter', 'Bitstream Charter', Georgia, serif">Charter</option>
                    </select>
                </div>
                <div class="settings-row">
                    <label>Align</label>
                    <div class="btn-group">
                        <button id="align-left">Left</button>
                        <button id="align-justify">Justify</button>
                    </div>
                </div>
                <div class="settings-row">
                    <label>Theme</label>
                    <div class="btn-group">
                        <button id="theme-light">Light</button>
                        <button id="theme-sepia">Sepia</button>
                        <button id="theme-dark">Dark</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="pdf-viewer" class="hidden">
            <canvas id="pdf-canvas"></canvas>
        </div>

        <div class="reading-area" id="reading-area">
            <div class="content" id="extracted-text-display">
                Loading text...
            </div>
        </div>

        <div id="annotation-toolbar" class="hidden">
            <button id="highlight-btn">Highlight</button>
            <button id="note-btn">Add Note</button>
        </div>
    </div>

    <script>
        const FONT_SIZE_MIN = 0.9;
        const FONT_SIZE_MAX = 2.2;
        const LINE_HEIGHT_MIN = 1.4;
        const LINE_HEIGHT_MAX = 2.8;
        const PADDING_MIN = 20;
        const PADDING_MAX = 120;

        const pdfUrl = "{{ url_for('uploaded_file', filename=filename) }}";
        const filename = "{{ filename }}";

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        const scale = 2.0;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const pageCountSpan = document.getElementById('page-count');
        const pageNumInput = document.getElementById('page-num-input');
        const extractedTextDisplay = document.getElementById('extracted-text-display');
        const pdfViewer = document.getElementById('pdf-viewer');
        const readingArea = document.getElementById('reading-area');
        const modeReaderBtn = document.getElementById('mode-reader-btn');
        const modePdfBtn = document.getElementById('mode-pdf-btn');
        const displaySettingsContainer = document.getElementById('display-settings-container');
        const fontFamilySelect = document.getElementById('font-family-select');
        const annotationToolbar = document.getElementById('annotation-toolbar');
        let currentSelection = null;

        // Reading-optimized defaults
        let currentFontSize = parseFloat(localStorage.getItem('readerFontSize')) || 1.25;
        let currentLineHeight = parseFloat(localStorage.getItem('readerLineHeight')) || 1.9;
        let currentPadding = parseFloat(localStorage.getItem('readerPadding')) || 60;
        let currentFontFamily = localStorage.getItem('readerFontFamily') || "'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif";
        let currentTextAlign = localStorage.getItem('readerTextAlign') || 'left';
        let currentTheme = localStorage.getItem('readerTheme') || 'theme-sepia';

        extractedTextDisplay.style.fontSize = `${currentFontSize}em`;
        extractedTextDisplay.style.lineHeight = `${currentLineHeight}`;
        extractedTextDisplay.style.padding = `${currentPadding}px`;
        extractedTextDisplay.style.fontFamily = currentFontFamily;
        extractedTextDisplay.style.textAlign = currentTextAlign;
        setTheme(currentTheme);
        fontFamilySelect.value = currentFontFamily;

        // --- Mode (Reader vs PDF) ---
        const modeStorageKey = `readerMode_${filename}`;
        let currentMode = localStorage.getItem(modeStorageKey) || 'reader';

        function setMode(mode) {
            currentMode = (mode === 'pdf') ? 'pdf' : 'reader';
            localStorage.setItem(modeStorageKey, currentMode);

            const showPdf = currentMode === 'pdf';
            pdfViewer.classList.toggle('hidden', !showPdf);
            readingArea.classList.toggle('hidden', showPdf);

            modeReaderBtn.classList.toggle('active', !showPdf);
            modePdfBtn.classList.toggle('active', showPdf);

            // Keep the settings panel accessible in Reader mode only.
            displaySettingsContainer.classList.toggle('hidden', showPdf);
        }

        modeReaderBtn.addEventListener('click', () => setMode('reader'));
        modePdfBtn.addEventListener('click', () => setMode('pdf'));

        // Keyboard shortcut: "v" toggles view (Reader <-> PDF)
        document.addEventListener('keydown', (e) => {
            if (e.defaultPrevented) return;
            const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
            if (tag === 'input' || tag === 'textarea' || e.metaKey || e.ctrlKey || e.altKey) return;
            if (e.key === 'v' || e.key === 'V') {
                setMode(currentMode === 'pdf' ? 'reader' : 'pdf');
            }
        });

        // --- Recents + resume ---
        const lastPageKey = `lastPage_${filename}`;
        const recentDocsKey = 'recentDocs_v1';

        function getRecentDocs() {
            try {
                const raw = localStorage.getItem(recentDocsKey);
                const list = raw ? JSON.parse(raw) : [];
                return Array.isArray(list) ? list : [];
            } catch {
                return [];
            }
        }

        function setRecentDocs(list) {
            try {
                localStorage.setItem(recentDocsKey, JSON.stringify(list));
            } catch {
                // ignore quota / private mode issues
            }
        }

        function upsertRecentDoc(update) {
            const list = getRecentDocs();
            const now = Date.now();
            const next = [
                { ...update, lastOpenedAt: now },
                ...list.filter(d => d && d.filename && d.filename !== update.filename)
            ].slice(0, 20);
            setRecentDocs(next);
        }

        function persistLastPage(n) {
            try { localStorage.setItem(lastPageKey, String(n)); } catch {}
            upsertRecentDoc({ filename, lastPage: n });
        }

        // --- Settings Listeners ---
        document.getElementById('toggle-display-settings').addEventListener('click', () => {
            displaySettingsContainer.classList.toggle('hidden');
        });

        document.getElementById('font-size-decrease').addEventListener('click', () => {
            currentFontSize = Math.max(FONT_SIZE_MIN, currentFontSize - 0.1);
            extractedTextDisplay.style.fontSize = `${currentFontSize}em`;
            localStorage.setItem('readerFontSize', currentFontSize);
        });
        document.getElementById('font-size-increase').addEventListener('click', () => {
            currentFontSize = Math.min(FONT_SIZE_MAX, currentFontSize + 0.1);
            extractedTextDisplay.style.fontSize = `${currentFontSize}em`;
            localStorage.setItem('readerFontSize', currentFontSize);
        });
        document.getElementById('line-height-decrease').addEventListener('click', () => {
            currentLineHeight = Math.max(LINE_HEIGHT_MIN, +(currentLineHeight - 0.1).toFixed(1));
            extractedTextDisplay.style.lineHeight = `${currentLineHeight}`;
            localStorage.setItem('readerLineHeight', currentLineHeight);
        });
        document.getElementById('line-height-increase').addEventListener('click', () => {
            currentLineHeight = Math.min(LINE_HEIGHT_MAX, +(currentLineHeight + 0.1).toFixed(1));
            extractedTextDisplay.style.lineHeight = `${currentLineHeight}`;
            localStorage.setItem('readerLineHeight', currentLineHeight);
        });
        document.getElementById('margin-decrease').addEventListener('click', () => {
            currentPadding = Math.max(PADDING_MIN, currentPadding - 10);
            extractedTextDisplay.style.padding = `${currentPadding}px`;
            localStorage.setItem('readerPadding', currentPadding);
        });
        document.getElementById('margin-increase').addEventListener('click', () => {
            currentPadding = Math.min(PADDING_MAX, currentPadding + 10);
            extractedTextDisplay.style.padding = `${currentPadding}px`;
            localStorage.setItem('readerPadding', currentPadding);
        });

        fontFamilySelect.addEventListener('change', () => {
            currentFontFamily = fontFamilySelect.value;
            extractedTextDisplay.style.fontFamily = currentFontFamily;
            localStorage.setItem('readerFontFamily', currentFontFamily);
        });

        document.getElementById('align-left').addEventListener('click', () => setTextAlign('left'));
        document.getElementById('align-justify').addEventListener('click', () => setTextAlign('justify'));
        document.getElementById('theme-light').addEventListener('click', () => setTheme('theme-light'));
        document.getElementById('theme-sepia').addEventListener('click', () => setTheme('theme-sepia'));
        document.getElementById('theme-dark').addEventListener('click', () => setTheme('theme-dark'));

        function setTextAlign(a) {
            extractedTextDisplay.style.textAlign = a;
            localStorage.setItem('readerTextAlign', a);
        }
        function setTheme(t) {
            document.body.className = '';
            document.body.classList.add(t);
            localStorage.setItem('readerTheme', t);
        }

        // --- PDF Rendering ---
        async function renderPage(num) {
            pageRendering = true;
            extractedTextDisplay.textContent = "Loading...";

            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport }).promise;
            pageRendering = false;

            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }

            pageNumInput.value = num;
            persistLastPage(num);

            // --- Layout-aware text extraction (reflow) ---
            let extractedText = '';
            try {
                const textContent = await page.getTextContent();
                const itemsRaw = (textContent && textContent.items) ? textContent.items : [];
                if (itemsRaw.length > 0) {
                    // Light header/footer suppression (common page numbers / running headers).
                    const pageHeight = page.view[3] - page.view[1];
                    const bottomMargin = page.view[1] + pageHeight * 0.06;
                    const topMargin = page.view[3] - pageHeight * 0.06;

                    const items = itemsRaw
                        .filter(item => {
                            const s = (item.str || '').trim();
                            if (!s) return false;
                            const y = item.transform[5];
                            return y > bottomMargin && y < topMargin;
                        })
                        .map(item => {
                            const text = (item.str || '').replace(/\s+/g, ' ').trim();
                            const x = item.transform[4];
                            const y = item.transform[5];
                            const w = typeof item.width === 'number' ? item.width : 0;
                            const charW = text.length > 0 && w > 0 ? (w / text.length) : 0;
                            return { text, x, y, w, charW };
                        })
                        .filter(it => it.text.length > 0);

                    if (items.length > 0) {
                        // Cluster into lines using an adaptive tolerance (PDFs vary wildly).
                        items.sort((a, b) => b.y - a.y || a.x - b.x);
                        const charWs = items.map(i => i.charW).filter(v => v > 0).sort((a, b) => a - b);
                        const medianCharW = charWs.length ? charWs[Math.floor(charWs.length / 2)] : 3;
                        const yTol = Math.max(2.5, Math.min(6, medianCharW * 1.1));

                        /** @type {Array<{y:number, runs:Array<any>}>} */
                        const lines = [];
                        let cur = { y: items[0].y, runs: [items[0]] };
                        for (let i = 1; i < items.length; i++) {
                            const it = items[i];
                            if (Math.abs(it.y - cur.y) <= yTol) {
                                cur.runs.push(it);
                            } else {
                                lines.push(cur);
                                cur = { y: it.y, runs: [it] };
                            }
                        }
                        lines.push(cur);

                        // For each line: sort left->right and insert spaces based on gaps.
                        const lineTexts = lines.map(line => {
                            const runs = line.runs.sort((a, b) => a.x - b.x);
                            if (runs.length === 0) return { y: line.y, text: '' };

                            const gapThreshold = Math.max(2.5, medianCharW * 0.6);
                            let out = runs[0].text;
                            let prev = runs[0];
                            for (let i = 1; i < runs.length; i++) {
                                const r = runs[i];
                                const prevEnd = prev.x + (prev.w || (prev.charW * prev.text.length) || 0);
                                const gap = r.x - prevEnd;
                                if (gap > gapThreshold && !out.endsWith(' ') && !r.text.startsWith(' ')) out += ' ';
                                out += r.text;
                                prev = r;
                            }
                            out = out.replace(/\s+/g, ' ').trim();
                            return { y: line.y, text: out };
                        }).filter(l => l.text.length > 0);

                        // Detect simple multi-column layouts by looking at the distribution of line starts.
                        const starts = lines
                            .map(line => {
                                const runs = line.runs.sort((a, b) => a.x - b.x);
                                return runs.length ? runs[0].x : null;
                            })
                            .filter(v => typeof v === 'number')
                            .sort((a, b) => a - b);
                        const p10 = starts.length ? starts[Math.floor(starts.length * 0.1)] : 0;
                        const p90 = starts.length ? starts[Math.floor(starts.length * 0.9)] : 0;
                        const twoColLikely = (p90 - p10) > (viewport.width * 0.35);
                        const splitX = viewport.width * 0.52;

                        let ordered;
                        if (twoColLikely) {
                            const left = [];
                            const right = [];
                            for (const line of lines) {
                                const runs = line.runs.sort((a, b) => a.x - b.x);
                                if (!runs.length) continue;
                                const startX = runs[0].x;
                                const text = lineTexts.find(t => t.y === line.y)?.text || '';
                                if (!text) continue;
                                (startX < splitX ? left : right).push({ y: line.y, text });
                            }
                            left.sort((a, b) => b.y - a.y);
                            right.sort((a, b) => b.y - a.y);
                            ordered = [...left, ...right];
                        } else {
                            ordered = [...lineTexts].sort((a, b) => b.y - a.y);
                        }

                        // Paragraph breaks from vertical gaps + text cues.
                        const gaps = [];
                        for (let i = 1; i < ordered.length; i++) gaps.push(ordered[i - 1].y - ordered[i].y);
                        const avgGap = gaps.length ? gaps.reduce((a, b) => a + b, 0) / gaps.length : 10;
                        const paraGap = Math.max(avgGap * 1.35, yTol * 2.2);

                        const outLines = [];
                        for (let i = 0; i < ordered.length; i++) {
                            const t = ordered[i].text;
                            outLines.push(t);
                            if (i < ordered.length - 1) {
                                const gap = ordered[i].y - ordered[i + 1].y;
                                const next = ordered[i + 1].text;
                                const looksLikeParaStart = next && /^[A-Z“"(\[]/.test(next) && !/^[a-z]/.test(next);
                                if (gap > paraGap || looksLikeParaStart) outLines.push('');
                            }
                        }

                        extractedText = outLines.join('\n');
                        extractedText = postProcessExtractedText(extractedText);
                    }
                }
            } catch (e) {
                console.error("Text layer error:", e);
            }

            // --- OCR fallback ---
            if (extractedText.trim() === '') {
                extractedTextDisplay.textContent = "Scanning page with OCR...";
                try {
                    const imageData = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                    const resp = await fetch('/api/ocr', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image_data: imageData })
                    });
                    const data = await resp.json();
                    extractedText = resp.ok
                        ? (data.text || 'No text detected.')
                        : `OCR error: ${data.error}`;
                } catch (e) {
                    extractedText = `OCR failed: ${e.message}`;
                }
            }

            extractedTextDisplay.textContent = postProcessExtractedText(extractedText);
            renderExistingAnnotations();
        }

        function postProcessExtractedText(text) {
            if (!text) return '';
            let t = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            // De-hyphenate common line-break hyphenation: "exam-\nple" -> "example"
            t = t.replace(/([A-Za-z])-\n([A-Za-z])/g, '$1$2');
            // Fix stray spaces before punctuation.
            t = t.replace(/\s+([,.;:!?])/g, '$1');
            // Normalize repeated spaces but keep paragraph breaks.
            t = t.split('\n').map(line => line.replace(/[ \t]+/g, ' ').trimEnd()).join('\n');
            // Collapse 3+ blank lines.
            t = t.replace(/\n{3,}/g, '\n\n');
            return t.trimEnd();
        }

        // --- Navigation ---
        function queueRenderPage(num) {
            if (pageRendering) { pageNumPending = num; } else { renderPage(num); }
        }
        function goToPage() {
            const num = parseInt(pageNumInput.value);
            if (num >= 1 && num <= pdfDoc.numPages) { pageNum = num; queueRenderPage(pageNum); }
        }
        function onPrevPage() { if (pageNum > 1) { pageNum--; queueRenderPage(pageNum); } }
        function onNextPage() { if (pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); } }

        // --- Annotations ---
        function saveAnnotations(a) { localStorage.setItem(`annotations_${filename}`, JSON.stringify(a)); }
        function loadAnnotations() { const d = localStorage.getItem(`annotations_${filename}`); return d ? JSON.parse(d) : []; }

        function applyHighlight(range, note = null) {
            const span = document.createElement('span');
            span.classList.add('highlighted-text');
            if (note) { span.title = note; span.classList.add('has-note'); }
            try { range.surroundContents(span); } catch (e) { return; }
            const annotations = loadAnnotations();
            annotations.push({
                text: span.textContent, note,
                startOffset: range.startOffset, endOffset: range.endOffset,
                startContainerPath: getElementPath(range.startContainer),
                endContainerPath: getElementPath(range.endContainer),
                page: pageNum
            });
            saveAnnotations(annotations);
        }

        function getElementPath(node) {
            if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
            let path = [];
            while (node && node !== extractedTextDisplay) {
                let sib = node.previousSibling, count = 0;
                while (sib) { if (sib.nodeType === Node.ELEMENT_NODE && sib.nodeName === node.nodeName) count++; sib = sib.previousSibling; }
                path.unshift(`${node.nodeName.toLowerCase()}[${count}]`);
                node = node.parentNode;
            }
            return path.join('/');
        }

        function getElementByPath(path) {
            let node = extractedTextDisplay;
            for (const part of path.split('/')) {
                const m = part.match(/([a-z]+)\[(\d+)\]/);
                if (!m) return null;
                let count = 0, child = node.firstChild;
                while (child) {
                    if (child.nodeType === Node.ELEMENT_NODE && child.nodeName.toLowerCase() === m[1]) {
                        if (count === parseInt(m[2])) { node = child; break; }
                        count++;
                    }
                    child = child.nextSibling;
                }
                if (!child) return null;
            }
            return node;
        }

        extractedTextDisplay.addEventListener('mouseup', () => {
            const sel = window.getSelection();
            if (sel.toString().length > 0 && extractedTextDisplay.contains(sel.anchorNode)) {
                currentSelection = sel.getRangeAt(0);
                const rect = currentSelection.getBoundingClientRect();
                annotationToolbar.style.top = `${rect.top + window.scrollY - 45}px`;
                annotationToolbar.style.left = `${rect.left + rect.width / 2 - 70}px`;
                annotationToolbar.classList.remove('hidden');
            } else {
                annotationToolbar.classList.add('hidden');
            }
        });

        document.getElementById('highlight-btn').addEventListener('click', () => {
            if (currentSelection) { applyHighlight(currentSelection.cloneRange()); annotationToolbar.classList.add('hidden'); window.getSelection().removeAllRanges(); }
        });
        document.getElementById('note-btn').addEventListener('click', () => {
            if (currentSelection) {
                const note = prompt("Enter your note:");
                if (note !== null) applyHighlight(currentSelection.cloneRange(), note);
                annotationToolbar.classList.add('hidden');
                window.getSelection().removeAllRanges();
            }
        });

        function renderExistingAnnotations() {
            loadAnnotations().forEach(a => {
                if (a.page === pageNum) {
                    const s = getElementByPath(a.startContainerPath), e = getElementByPath(a.endContainerPath);
                    if (s && e) {
                        const range = document.createRange();
                        range.setStart(s.childNodes[0] || s, a.startOffset);
                        range.setEnd(e.childNodes[0] || e, a.endOffset);
                        applyHighlight(range, a.note);
                    }
                }
            });
        }

        // Load PDF
        pdfjsLib.getDocument(pdfUrl).promise.then(doc => {
            pdfDoc = doc;
            pageCountSpan.textContent = pdfDoc.numPages;
            pageNumInput.max = pdfDoc.numPages;
            // Resume last page when available.
            const saved = parseInt(localStorage.getItem(lastPageKey) || '1', 10);
            if (Number.isFinite(saved) && saved >= 1 && saved <= pdfDoc.numPages) pageNum = saved;
            renderPage(pageNum);
            setMode(currentMode);
            upsertRecentDoc({ filename, lastPage: pageNum });
        }).catch(err => {
            extractedTextDisplay.textContent = `Error loading PDF: ${err.message}`;
        });
    </script>
</body>
</html>
