<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Reader Lite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>E-Reader Lite</h1>
            <p class="subtitle">Your intelligent reading companion.</p>
        </div>

        <div class="library hidden" id="library">
            <div class="library-header">
                <h2 class="library-title">Continue reading</h2>
                <button type="button" class="link-btn" id="clear-library-btn">Clear</button>
            </div>
            <div class="library-list" id="library-list"></div>
            <p class="library-hint" id="library-hint">Tip: click a title to reopen to your last page.</p>
        </div>

        <form action="/upload" method="post" enctype="multipart/form-data" id="upload-form">
            <div class="upload-box">
                <input type="file" name="file" id="file-input" accept=".pdf" required onchange="handleFileSelect(this)">
                <label for="file-input" class="upload-label">
                    <span class="upload-icon">&#8686;</span>
                    <span class="upload-text" id="upload-text">Choose a PDF or drop it here</span>
                </label>
            </div>

            <div class="advanced-options">
                <p class="status-line">
                    {% if ocr_ready %}
                        <span style="color: #34a853;">&#9679;</span> OCR ready ({{ ocr_model }})
                    {% else %}
                        <span style="color: #999;">&#9679;</span> Run <code>ollama pull {{ ocr_model }}</code> to enable OCR for scanned PDFs
                    {% endif %}
                </p>
            </div>

            <button type="submit" id="submit-btn" class="hidden">Start Reading</button>
        </form>
    </div>

    <script>
        const recentDocsKey = 'recentDocs_v1';

        function getRecentDocs() {
            try {
                const raw = localStorage.getItem(recentDocsKey);
                const list = raw ? JSON.parse(raw) : [];
                return Array.isArray(list) ? list : [];
            } catch {
                return [];
            }
        }

        function setRecentDocs(list) {
            try { localStorage.setItem(recentDocsKey, JSON.stringify(list)); } catch {}
        }

        function fmtTime(ts) {
            if (!ts) return '';
            try { return new Date(ts).toLocaleString(); } catch { return ''; }
        }

        async function checkExists(filename) {
            // Validate the file still exists on the server.
            try {
                const resp = await fetch(`/uploads/${encodeURIComponent(filename)}`, { method: 'HEAD' });
                return resp.ok;
            } catch {
                return false;
            }
        }

        async function renderLibrary() {
            const libraryEl = document.getElementById('library');
            const listEl = document.getElementById('library-list');
            const hintEl = document.getElementById('library-hint');

            let docs = getRecentDocs()
                .filter(d => d && typeof d.filename === 'string' && d.filename.length > 0)
                .slice(0, 20);

            // Filter out missing files (best effort).
            const existence = await Promise.all(docs.map(d => checkExists(d.filename)));
            docs = docs.filter((_, i) => existence[i]);
            setRecentDocs(docs);

            if (docs.length === 0) {
                libraryEl.classList.add('hidden');
                return;
            }

            libraryEl.classList.remove('hidden');
            listEl.innerHTML = '';

            for (const d of docs) {
                const a = document.createElement('a');
                a.className = 'library-item';
                a.href = `/read/${encodeURIComponent(d.filename)}`;
                a.title = 'Open';

                const name = document.createElement('div');
                name.className = 'library-name';
                name.textContent = d.filename.replace(/_/g, ' ');

                const meta = document.createElement('div');
                meta.className = 'library-meta';
                const page = (typeof d.lastPage === 'number' && Number.isFinite(d.lastPage)) ? d.lastPage : null;
                meta.textContent = [
                    page ? `Page ${page}` : null,
                    d.lastOpenedAt ? `Last opened ${fmtTime(d.lastOpenedAt)}` : null
                ].filter(Boolean).join(' • ');

                a.appendChild(name);
                a.appendChild(meta);
                listEl.appendChild(a);
            }

            hintEl.classList.toggle('hidden', docs.length === 0);
        }

        function handleFileSelect(input) {
            const uploadText = document.getElementById('upload-text');
            const submitBtn = document.getElementById('submit-btn');
            if (input.files && input.files.length > 0) {
                uploadText.textContent = `Selected: ${input.files[0].name}`;
                submitBtn.classList.remove('hidden');
            } else {
                uploadText.textContent = 'Choose a PDF or drop it here';
                submitBtn.classList.add('hidden');
            }
        }

        document.getElementById('clear-library-btn').addEventListener('click', () => {
            setRecentDocs([]);
            renderLibrary();
        });

        renderLibrary();
    </script>
</body>
</html>
